name: Trump Impact Monitor (hourly)

on:
  schedule:
    - cron: '0 * * * *'   # every full hour
  workflow_dispatch:       # manual trigger via GitHub UI

permissions:
  contents: write          # needed for git push (DB update)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run monitor ─────────────────────────────────────────────
      - name: Run Trump Impact Monitor
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPE_CREATORS_API_KEY: ${{ secrets.SCRAPE_CREATORS_API_KEY }}
          GMAIL_EMAIL:             ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:         ${{ secrets.RECIPIENT_EMAIL }}
        run: python -u main.py

      # ── 5. Commit updated SQLite DB back to repo ───────────────────
      - name: Commit updated alerts.db
        run: |
          git config --global user.name  "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add alerts.db
          git diff --staged --quiet && echo "No DB changes to commit." || \
            git commit -m "chore: update alerts.db [skip ci]"
          git push
